name: NewFin Collector

on:
  schedule:
    # כל 30 דקות בין 06:00 ל-22:00 UTC (09:00-01:00 שעון ישראל — שעות פעילות הבורסה ואחריה)
    - cron: '*/30 6-22 * * *'
  workflow_dispatch: # הפעלה ידנית מ-GitHub Actions

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node collector/run.mjs
